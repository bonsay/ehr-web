# nginx config for the containerised web app. Serves the Angular SPA and proxies
# the API/FHIR calls to the api service so the browser talks to a single origin
# (no CORS needed). "api" is the compose service name for ehr-api.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy backend calls to the API container.
    location /api/ {
        proxy_pass http://api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fhir/ {
        proxy_pass http://api:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: let the Angular router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
