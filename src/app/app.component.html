<header class="topbar">
  <div class="brand">
    <span class="logo">✚</span>
    <span class="title">Modular EHR</span>
  </div>

  <nav class="nav" *ngIf="auth.hasValidToken()">
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/patients" routerLinkActive="active">Patients</a>
    <a routerLink="/modules" routerLinkActive="active">Modules</a>
    <a routerLink="/admin" routerLinkActive="active" *ngIf="auth.isAdmin">Admin</a>
  </nav>

  <div class="spacer"></div>

  <div class="institution-picker" *ngIf="institutions.length && auth.hasValidToken()">
    <label for="inst">Acting as</label>
    <select id="inst"
            [value]="current?.id"
            [disabled]="context.locked"
            [title]="context.locked ? 'Set by your signed-in identity' : ''"
            (change)="onInstitutionChange($any($event.target).value)">
      <option *ngFor="let i of institutions" [value]="i.id">{{ i.name }} ({{ i.code }})</option>
    </select>
  </div>

  <div class="auth-box" *ngIf="auth.enabled">
    <span class="user" *ngIf="auth.hasValidToken()">
      {{ auth.username || 'Signed in' }}
      <span class="role-badge" *ngIf="auth.role">{{ auth.role }}</span>
    </span>
    <button class="btn btn-sm" *ngIf="auth.hasValidToken()" (click)="signOut()">Sign out</button>
  </div>
</header>

<main>
  <router-outlet></router-outlet>
</main>
