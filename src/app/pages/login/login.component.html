<div class="login-wrap">
  <div class="card login-card">
    <div class="brand" style="justify-content: center; margin-bottom: 8px;">
      <span class="logo">✚</span>
      <span class="title">Modular EHR</span>
    </div>
    <p class="text-muted text-center">Sign in to continue</p>

    <form (ngSubmit)="submit()">
      <label class="field-label" for="u">Username</label>
      <input id="u" autocomplete="username" [(ngModel)]="username" name="username"
             placeholder="e.g. physician" />

      <label class="field-label" for="p">Password</label>
      <input id="p" type="password" autocomplete="current-password"
             [(ngModel)]="password" name="password" placeholder="••••••••" />

      <p class="badge badge-revoked login-error" *ngIf="error">{{ error }}</p>

      <button class="btn btn-primary login-submit" type="submit" [disabled]="busy">
        {{ busy ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="text-muted text-center" style="margin-top: 14px;">
      New here? <a routerLink="/register">Create an institution</a>
    </p>

    <div class="demo">
      <p class="text-muted demo-heading">Demo accounts — click to fill</p>
      <button class="demo-account" *ngFor="let a of demoAccounts" (click)="prefill(a.username)">
        <strong>{{ a.username }}</strong>
        <span class="text-muted">{{ a.role }}</span>
      </button>
    </div>
  </div>
</div>
